<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Connexion — IKMS Centrale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/css/theme.css">
<style>
  .ecran-connexion { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .carte-connexion { background: var(--papier); border: 1px solid var(--ligne); border-radius: 18px; padding: 34px; width: 100%; max-width: 380px; box-shadow: var(--ombre); }
  .logo-bloc { text-align: center; margin-bottom: 26px; }
  .logo-bloc .marque { font-size: 20px; font-weight: 800; color: var(--terracotta); }
  .logo-bloc .marque span { display: block; font-size: 10.5px; font-weight: 600; color: var(--ink-soft); margin-top: 2px; letter-spacing: 0.02em; }
  .logo-bloc .sous-marque { font-size: 13px; color: var(--ink-soft); margin-top: 3px; }
  form { display: flex; flex-direction: column; gap: 14px; }
  label { font-size: 12.5px; font-weight: 700; color: var(--ink-soft); }
  input { height: 40px; border: 1.5px solid var(--ligne); border-radius: 10px; padding: 0 12px; background: var(--creme); }
  input:focus { border-color: var(--terracotta); outline: none; }
  .bouton-connexion { height: 42px; background: var(--terracotta); color: var(--papier); border: none; border-radius: 10px; font-weight: 700; margin-top: 4px; }
  .bouton-connexion:disabled { opacity: 0.6; }
  .erreur { color: var(--alerte); font-size: 13px; font-weight: 600; text-align: center; min-height: 16px; }
  .banniere-session {
    background: var(--attente-fond); color: var(--ink); font-size: 13px; text-align: center;
    padding: 12px; border-radius: 10px; margin-bottom: 18px; line-height: 1.5;
  }
  .banniere-session a { color: var(--terracotta); font-weight: 700; text-decoration: underline; cursor: pointer; }
</style>
</head>
<body>
  <div class="ecran-connexion">
    <div class="carte-connexion">
      <div class="logo-bloc">
        <div class="marque">IKMS<span>Ikigai Mobility Software</span></div>
        <div class="sous-marque">Espace centrale</div>
      </div>
      <div class="banniere-session" id="banniere-session" hidden></div>
      <form id="form-connexion">
        <div>
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="username" required placeholder="agent@ikigai.ci">
        </div>
        <div>
          <label for="password">Mot de passe</label>
          <input id="password" type="password" autocomplete="current-password" required placeholder="••••••••">
        </div>
        <p class="erreur" id="message-erreur" role="alert"></p>
        <button class="bouton-connexion" type="submit" id="bouton-connexion">Se connecter</button>
      </form>
    </div>
  </div>
  <script src="./assets/js/config.public.js"></script>
  <script type="module" src="./assets/js/login.js"></script>
</body>
</html>
